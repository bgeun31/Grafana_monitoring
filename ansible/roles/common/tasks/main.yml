---
- name: Install baseline packages
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - gnupg
    state: present
    update_cache: true

- name: Ensure monitoring root exists
  ansible.builtin.file:
    path: "{{ monitoring_root }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

